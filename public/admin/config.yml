backend:
  name: github
  repo: haroldjohnmb95-jpg/mossroom-co
  branch: main
  base_url: https://decap-oauth.haroldjohnmb95.workers.dev

media_folder: "public/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "articles"
    label: "Articles"
    label_singular: "Article"
    folder: "src/content/articles"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{category}} — {{pubDate | date('YYYY-MM-DD')}}"
    sortable_fields: ["title", "category", "pubDate", "draft"]
    view_filters:
      - label: "Drafts"
        field: draft
        pattern: true
      - label: "Published"
        field: draft
        pattern: false
      - label: "Care guides"
        field: category
        pattern: "care-guide"
      - label: "Plant profiles"
        field: category
        pattern: "plant-profile"
      - label: "Sourcing"
        field: category
        pattern: "sourcing"
      - label: "Problem solving"
        field: category
        pattern: "problem-solving"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short description", name: "description", widget: "text", pattern: ['^.{50,180}$', 'Description must be 50–180 chars'] }
      - { label: "Category", name: "category", widget: "select", options: ["care-guide", "plant-profile", "sourcing", "problem-solving", "inspiration", "beginner"] }
      - { label: "Difficulty", name: "difficulty", widget: "select", options: ["beginner", "intermediate", "advanced"], required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Publish date", name: "pubDate", widget: "datetime" }
      - { label: "Updated date", name: "updatedDate", widget: "datetime", required: false }
      - { label: "Author", name: "author", widget: "string", default: "Mossroom Team" }
      - { label: "Reading time (minutes)", name: "readingTime", widget: "number", required: false, value_type: "int", min: 1, max: 60 }
      - { label: "Cover image", name: "cover", widget: "image", required: false }
      - { label: "Cover alt text", name: "coverAlt", widget: "string", required: false }
      - { label: "Featured on homepage?", name: "featured", widget: "boolean", default: false }
      - { label: "Draft (not published)", name: "draft", widget: "boolean", default: true }
      - { label: "Body", name: "body", widget: "markdown" }
